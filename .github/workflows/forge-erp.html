<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forge ERP v2.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ─── TOKENS ─────────────────────────────────────────────── */
:root{
  --bg-void:#0a0a0b;--bg-base:#111114;--bg-surface:#18181d;
  --bg-raised:#1f1f27;--bg-hover:#26262f;
  --border:#2a2a35;--border-hi:#3d3d50;
  --forge:#f97316;--forge-dim:rgba(249,115,22,.15);
  --forge-glow:rgba(249,115,22,.22);--forge-faint:rgba(249,115,22,.07);
  --ember:#fb923c;--amber:#fbbf24;--steel:#94a3b8;--mist:#64748b;--smoke:#475569;
  --ok:#22c55e;--err:#ef4444;--warn:#eab308;--info:#38bdf8;
  --text-hi:#f1f5f9;--text-md:#94a3b8;--text-lo:#475569;
  --sidebar-w:240px;--header-h:60px;--radius:10px;--radius-lg:16px;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;--display:'Syne',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px;scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg-void);color:var(--text-hi);min-height:100vh;display:flex;overflow:hidden}
body::before{content:'';position:fixed;inset:0;z-index:1000;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");opacity:.025;}

/* ─── SIDEBAR ─────────────────────────────────────────────── */
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--bg-base);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;position:sticky;top:0;z-index:100;transition:transform .25s ease;}
.sidebar-logo{height:var(--header-h);display:flex;align-items:center;gap:10px;padding:0 18px;border-bottom:1px solid var(--border);}
.logo-mark{width:32px;height:32px;border-radius:8px;background:var(--forge);display:grid;place-items:center;box-shadow:0 0 16px var(--forge-glow);flex-shrink:0;}
.logo-mark svg{width:18px;height:18px;fill:var(--bg-void)}
.logo-text{font-family:var(--display);font-size:1.1rem;font-weight:800;letter-spacing:-.02em;color:var(--text-hi);white-space:nowrap;}
.logo-text span{color:var(--forge)}
.logo-badge{margin-left:auto;font-family:var(--mono);font-size:.65rem;background:var(--forge-faint);border:1px solid rgba(249,115,22,.3);color:var(--forge);padding:2px 6px;border-radius:4px;white-space:nowrap;}
.sidebar-section{padding:12px 10px 4px;font-size:.65rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-lo);}
.nav-scroll{flex:1;overflow-y:auto;padding-bottom:8px;}
.nav-scroll::-webkit-scrollbar{width:3px}
.nav-scroll::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;margin:1px 6px;border-radius:8px;cursor:pointer;color:var(--text-md);font-size:.875rem;transition:all .15s;position:relative;user-select:none;}
.nav-item:hover{background:var(--bg-hover);color:var(--text-hi)}
.nav-item.active{background:var(--forge-faint);color:var(--forge);border:1px solid rgba(249,115,22,.2);}
.nav-item.active::before{content:'';position:absolute;left:-6px;top:50%;transform:translateY(-50%);width:3px;height:20px;background:var(--forge);border-radius:0 3px 3px 0;}
.nav-icon{width:18px;height:18px;flex-shrink:0;opacity:.85}
.nav-badge{margin-left:auto;font-family:var(--mono);font-size:.65rem;background:var(--forge);color:var(--bg-void);padding:1px 6px;border-radius:20px;font-weight:500;}
.sidebar-footer{padding:12px 10px;border-top:1px solid var(--border);}
.user-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:background .15s;}
.user-row:hover{background:var(--bg-hover)}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--forge),var(--amber));display:grid;place-items:center;font-family:var(--display);font-size:.8rem;font-weight:700;color:var(--bg-void);flex-shrink:0;}
.user-info{flex:1;min-width:0}
.user-name{font-size:.8rem;font-weight:600;color:var(--text-hi);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role{font-size:.7rem;color:var(--text-lo)}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--ok);flex-shrink:0;box-shadow:0 0 6px var(--ok);}

/* ─── MAIN ────────────────────────────────────────────────── */
.main{flex:1;display:flex;flex-direction:column;overflow:auto;height:100vh;min-width:0;}

/* ─── TOPBAR ──────────────────────────────────────────────── */
.topbar{height:var(--header-h);display:flex;align-items:center;gap:12px;padding:0 24px;background:var(--bg-base);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;flex-shrink:0;}
.hamburger{display:none;width:34px;height:34px;border-radius:8px;background:var(--bg-surface);border:1px solid var(--border);cursor:pointer;align-items:center;justify-content:center;color:var(--text-md);transition:all .15s;flex-shrink:0;}
.hamburger:hover{background:var(--bg-hover);color:var(--text-hi)}
.topbar-breadcrumb{font-size:.8rem;color:var(--text-lo);display:flex;align-items:center;gap:6px;}
.topbar-breadcrumb b{color:var(--text-hi);font-weight:500}
.crumb-sep{color:var(--border-hi)}
.topbar-search{margin-left:auto;display:flex;align-items:center;gap:8px;background:var(--bg-surface);border:1px solid var(--border);border-radius:8px;padding:6px 12px;color:var(--text-lo);font-size:.8rem;transition:border .15s;cursor:pointer;user-select:none;}
.topbar-search:hover{border-color:var(--border-hi);color:var(--text-md)}
.topbar-search svg{width:14px;height:14px;flex-shrink:0}
.kbd{font-family:var(--mono);font-size:.65rem;background:var(--bg-raised);padding:1px 5px;border-radius:3px;color:var(--text-lo)}
.topbar-actions{display:flex;align-items:center;gap:8px}
.icon-btn{width:34px;height:34px;border-radius:8px;background:var(--bg-surface);border:1px solid var(--border);display:grid;place-items:center;cursor:pointer;color:var(--text-md);transition:all .15s;position:relative;}
.icon-btn:hover{background:var(--bg-hover);color:var(--text-hi);border-color:var(--border-hi)}
.icon-btn svg{width:16px;height:16px}
.notif-dot{position:absolute;top:5px;right:5px;width:6px;height:6px;border-radius:50%;background:var(--forge);border:1.5px solid var(--bg-base);}
.live-pill{display:flex;align-items:center;gap:6px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:var(--ok);font-size:.72rem;font-weight:500;padding:4px 10px;border-radius:20px;}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--ok);animation:pulse 1.5s infinite;}
.topbar-clock{font-family:var(--mono);font-size:.75rem;color:var(--text-lo);min-width:44px;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}

/* ─── CONTENT ─────────────────────────────────────────────── */
.content{padding:24px;display:flex;flex-direction:column;gap:20px;flex:1;min-height:0;}

/* ─── PAGE HEADER ─────────────────────────────────────────── */
.page-title{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.page-title h1{font-family:var(--display);font-size:1.6rem;font-weight:800;letter-spacing:-.03em;color:var(--text-hi);line-height:1;}
.page-title h1 span{color:var(--forge)}
.page-subtitle{font-size:.8rem;color:var(--text-lo);margin-top:4px}
.page-actions{display:flex;gap:8px;flex-wrap:wrap;}

/* ─── BUTTONS ─────────────────────────────────────────────── */
.btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;font-size:.8rem;font-weight:500;cursor:pointer;border:none;font-family:var(--font);transition:all .15s;}
.btn-ghost{background:var(--bg-surface);border:1px solid var(--border);color:var(--text-md)}
.btn-ghost:hover{background:var(--bg-hover);color:var(--text-hi);border-color:var(--border-hi)}
.btn-forge{background:var(--forge);color:var(--bg-void);font-weight:600;box-shadow:0 0 20px var(--forge-glow)}
.btn-forge:hover{background:var(--ember);box-shadow:0 0 30px rgba(249,115,22,.35)}
.btn-ok{background:rgba(34,197,94,.15);color:var(--ok);border:1px solid rgba(34,197,94,.3)}
.btn-ok:hover{background:rgba(34,197,94,.25)}
.btn-err{background:rgba(239,68,68,.15);color:var(--err);border:1px solid rgba(239,68,68,.3)}
.btn-err:hover{background:rgba(239,68,68,.25)}
.btn-sm{padding:5px 10px;font-size:.75rem;}
.btn svg{width:14px;height:14px}

/* ─── RANGE TABS ──────────────────────────────────────────── */
.range-tabs{display:flex;gap:2px;background:var(--bg-surface);border:1px solid var(--border);border-radius:8px;padding:3px;}
.range-tab{padding:5px 12px;border-radius:6px;font-size:.75rem;cursor:pointer;color:var(--text-lo);transition:all .15s;user-select:none;}
.range-tab.active{background:var(--bg-raised);color:var(--text-hi);font-weight:500}

/* ─── KPI GRID ────────────────────────────────────────────── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.kpi-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px 20px;position:relative;overflow:hidden;transition:border .2s,transform .2s;cursor:default;}
.kpi-card:hover{border-color:var(--border-hi);transform:translateY(-1px)}
.kpi-card.forge{border-color:rgba(249,115,22,.3)}
.kpi-card.forge::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at top right,var(--forge-faint) 0%,transparent 70%);pointer-events:none;}
.kpi-label{font-size:.72rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--text-lo);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.kpi-icon{width:26px;height:26px;border-radius:6px;display:grid;place-items:center;flex-shrink:0;}
.kpi-icon svg{width:14px;height:14px}
.kpi-value{font-family:var(--mono);font-size:1.6rem;font-weight:500;color:var(--text-hi);letter-spacing:-.02em;line-height:1;}
.kpi-value.forge-text{color:var(--forge)}
.kpi-footer{display:flex;align-items:center;gap:8px;margin-top:10px}
.kpi-delta{display:flex;align-items:center;gap:3px;font-family:var(--mono);font-size:.72rem;font-weight:500;padding:2px 7px;border-radius:4px;}
.kpi-delta.up{background:rgba(34,197,94,.1);color:var(--ok)}
.kpi-delta.down{background:rgba(239,68,68,.1);color:var(--err)}
.kpi-delta.neutral{background:rgba(148,163,184,.1);color:var(--steel)}
.kpi-period{font-size:.7rem;color:var(--text-lo)}
.kpi-sparkline{position:absolute;bottom:0;right:0;width:80px;height:40px;opacity:.3}

/* ─── PANEL ───────────────────────────────────────────────── */
.panel{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);}
.panel-title{font-family:var(--display);font-size:.95rem;font-weight:700;color:var(--text-hi)}
.panel-sub{font-size:.7rem;color:var(--text-lo);margin-top:2px}
.panel-body{padding:20px}
.panel-actions{display:flex;gap:6px}
.micro-btn{display:flex;align-items:center;gap:4px;padding:5px 10px;border-radius:6px;font-size:.72rem;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--bg-raised);color:var(--text-md);transition:all .15s;font-family:var(--font);user-select:none;}
.micro-btn:hover{border-color:var(--border-hi);color:var(--text-hi)}
.micro-btn.active{border-color:rgba(249,115,22,.4);color:var(--forge);background:var(--forge-faint)}
.micro-btn svg{width:12px;height:12px}

/* ─── CHARTS GRID ─────────────────────────────────────────── */
.charts-grid{display:grid;grid-template-columns:2fr 1fr;gap:12px}
.chart-wrap{position:relative;width:100%}
.chart-wrap canvas{width:100%!important}
.bottom-grid{display:grid;grid-template-columns:3fr 2fr;gap:12px}

/* ─── TABLE ───────────────────────────────────────────────── */
.data-table{width:100%;border-collapse:collapse}
.data-table th{padding:8px 14px;text-align:left;font-size:.68rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text-lo);border-bottom:1px solid var(--border);white-space:nowrap;}
.data-table td{padding:10px 14px;font-size:.8rem;border-bottom:1px solid rgba(42,42,53,.6);color:var(--text-md);vertical-align:middle;}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:var(--bg-raised)}
.data-table td.center{text-align:center}
.mono{font-family:var(--mono)}
.text-hi{color:var(--text-hi)}

/* ─── BADGES ──────────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:.68rem;font-weight:600;white-space:nowrap;}
.badge-green{background:rgba(34,197,94,.1);color:var(--ok);border:1px solid rgba(34,197,94,.2)}
.badge-orange{background:rgba(249,115,22,.1);color:var(--forge);border:1px solid rgba(249,115,22,.2)}
.badge-yellow{background:rgba(234,179,8,.1);color:var(--amber);border:1px solid rgba(234,179,8,.2)}
.badge-red{background:rgba(239,68,68,.1);color:var(--err);border:1px solid rgba(239,68,68,.2)}
.badge-blue{background:rgba(56,189,248,.1);color:var(--info);border:1px solid rgba(56,189,248,.2)}
.badge-gray{background:rgba(100,116,139,.1);color:var(--steel);border:1px solid rgba(100,116,139,.2)}
.badge-dot{width:5px;height:5px;border-radius:50%;background:currentColor}

/* ─── SUMMARY ROW ─────────────────────────────────────────── */
.summary-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border-radius:var(--radius);overflow:hidden;}
.summary-cell{background:var(--bg-raised);padding:14px 16px;display:flex;flex-direction:column;gap:3px;}
.summary-label{font-size:.68rem;text-transform:uppercase;letter-spacing:.07em;color:var(--text-lo);font-weight:600}
.summary-val{font-family:var(--mono);font-size:1rem;color:var(--text-hi)}
.summary-val.forge{color:var(--forge)}

/* ─── CHANNEL BARS ────────────────────────────────────────── */
.channel-list{display:flex;flex-direction:column;gap:14px}
.channel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.channel-name{font-size:.8rem;color:var(--text-hi);font-weight:500}
.channel-val{font-family:var(--mono);font-size:.78rem;color:var(--text-md)}
.channel-bar{height:5px;background:var(--bg-raised);border-radius:3px;overflow:hidden}
.channel-fill{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.channel-meta{display:flex;align-items:center;justify-content:space-between;margin-top:3px;font-size:.68rem;color:var(--text-lo)}

/* ─── TOP PRODUCTS ────────────────────────────────────────── */
.prod-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(42,42,53,.5);}
.prod-item:last-child{border-bottom:none}
.prod-rank{font-family:var(--mono);font-size:.8rem;color:var(--text-lo);width:18px;text-align:center;flex-shrink:0;}
.prod-rank.gold{color:var(--amber)}
.prod-img{width:36px;height:36px;border-radius:7px;flex-shrink:0;display:grid;place-items:center;font-size:1.2rem;}
.prod-info{flex:1;min-width:0}
.prod-name{font-size:.82rem;color:var(--text-hi);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prod-cat{font-size:.7rem;color:var(--text-lo)}
.prod-sales{display:flex;flex-direction:column;align-items:flex-end;font-family:var(--mono);font-size:.78rem;color:var(--text-hi);}
.prod-sales small{color:var(--text-lo);font-size:.68rem}
.prod-trend{font-size:.68rem;padding:1px 5px;border-radius:3px;font-family:var(--mono);flex-shrink:0;}
.prod-trend.up{background:rgba(34,197,94,.1);color:var(--ok)}
.prod-trend.down{background:rgba(239,68,68,.1);color:var(--err)}

/* ─── ACTIVITY FEED ───────────────────────────────────────── */
.activity-list{display:flex;flex-direction:column;gap:0}
.activity-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid rgba(42,42,53,.5)}
.activity-item:last-child{border-bottom:none}
.activity-icon{width:30px;height:30px;border-radius:8px;flex-shrink:0;display:grid;place-items:center;margin-top:1px;}
.activity-icon svg{width:14px;height:14px}
.activity-body{flex:1;min-width:0}
.activity-text{font-size:.8rem;color:var(--text-md);line-height:1.4}
.activity-text b{color:var(--text-hi);font-weight:500}
.activity-time{font-family:var(--mono);font-size:.68rem;color:var(--text-lo);margin-top:2px}
.forge-line{height:1px;background:linear-gradient(90deg,transparent,var(--forge),transparent);opacity:.3;}

/* ─── MODAL ───────────────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-box{background:var(--bg-surface);border:1px solid var(--border-hi);border-radius:var(--radius-lg);width:100%;max-width:560px;max-height:85vh;display:flex;flex-direction:column;transform:translateY(12px);transition:transform .2s;overflow:hidden;}
.modal-overlay.open .modal-box{transform:translateY(0)}
.modal-box.lg{max-width:780px}
.modal-box.sm{max-width:400px}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border);flex-shrink:0;}
.modal-title{font-family:var(--display);font-size:1rem;font-weight:700;color:var(--text-hi)}
.modal-close{width:28px;height:28px;border-radius:6px;background:var(--bg-raised);border:1px solid var(--border);cursor:pointer;display:grid;place-items:center;color:var(--text-lo);font-size:1rem;transition:all .15s;}
.modal-close:hover{background:var(--bg-hover);color:var(--text-hi)}
.modal-body{padding:22px;overflow-y:auto;flex:1;}
.modal-footer{padding:16px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0;}

/* ─── FORMS ───────────────────────────────────────────────── */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.form-row.full{grid-template-columns:1fr}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:.72rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--text-lo)}
.form-input,.form-select,.form-textarea{background:var(--bg-raised);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:.85rem;color:var(--text-hi);font-family:var(--font);transition:border .15s;outline:none;width:100%;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--forge);box-shadow:0 0 0 2px rgba(249,115,22,.1);}
.form-textarea{resize:vertical;min-height:80px}
.form-select{cursor:pointer;-webkit-appearance:none}
.form-hint{font-size:.7rem;color:var(--text-lo)}

/* ─── TOAST ───────────────────────────────────────────────── */
#toast-container{position:fixed;bottom:24px;right:24px;z-index:900;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:10px;font-size:.82rem;font-weight:500;background:var(--bg-raised);border:1px solid var(--border-hi);color:var(--text-hi);box-shadow:0 8px 24px rgba(0,0,0,.4);transform:translateX(120%);transition:transform .3s cubic-bezier(.34,1.56,.64,1);pointer-events:all;min-width:220px;max-width:340px;}
.toast.show{transform:translateX(0)}
.toast.success{border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.08)}
.toast.error{border-color:rgba(239,68,68,.4);background:rgba(239,68,68,.08)}
.toast.warning{border-color:rgba(234,179,8,.4);background:rgba(234,179,8,.08)}
.toast.info{border-color:rgba(56,189,248,.4);background:rgba(56,189,248,.08)}
.toast-icon{font-size:1rem;flex-shrink:0}

/* ─── SEARCH MODAL ────────────────────────────────────────── */
.search-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:600;display:flex;align-items:flex-start;justify-content:center;padding-top:80px;opacity:0;pointer-events:none;transition:opacity .15s;}
.search-overlay.open{opacity:1;pointer-events:all}
.search-box{background:var(--bg-surface);border:1px solid var(--border-hi);border-radius:var(--radius-lg);width:560px;max-width:90vw;overflow:hidden;transform:translateY(-8px);transition:transform .15s;}
.search-overlay.open .search-box{transform:translateY(0)}
.search-input-row{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--border);}
.search-input-row svg{color:var(--text-lo);flex-shrink:0}
.search-input{flex:1;background:none;border:none;outline:none;font-size:1rem;color:var(--text-hi);font-family:var(--font);}
.search-results{max-height:360px;overflow-y:auto;padding:8px}
.search-group{padding:4px 8px;font-size:.65rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-lo);margin-top:4px;}
.search-result{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;transition:background .1s;}
.search-result:hover,.search-result.focused{background:var(--bg-hover)}
.search-result-icon{width:28px;height:28px;border-radius:6px;background:var(--bg-raised);display:grid;place-items:center;font-size:.9rem;flex-shrink:0;}
.search-result-text{flex:1;font-size:.82rem;color:var(--text-hi)}
.search-result-sub{font-size:.7rem;color:var(--text-lo)}
.search-empty{padding:32px;text-align:center;color:var(--text-lo);font-size:.85rem}

/* ─── NOTIFICATIONS DROPDOWN ──────────────────────────────── */
.notif-dropdown{position:absolute;top:calc(100% + 8px);right:0;width:320px;background:var(--bg-surface);border:1px solid var(--border-hi);border-radius:var(--radius-lg);box-shadow:0 16px 40px rgba(0,0,0,.5);z-index:300;display:none;overflow:hidden;}
.notif-dropdown.open{display:block}
.notif-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);}
.notif-title{font-family:var(--display);font-size:.85rem;font-weight:700;color:var(--text-hi)}
.notif-mark{font-size:.72rem;color:var(--forge);cursor:pointer}
.notif-item{display:flex;gap:10px;padding:12px 16px;border-bottom:1px solid rgba(42,42,53,.5);cursor:pointer;transition:background .1s;}
.notif-item:last-child{border-bottom:none}
.notif-item:hover{background:var(--bg-raised)}
.notif-item.unread{background:rgba(249,115,22,.04)}
.notif-icon{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;font-size:.85rem;flex-shrink:0;}
.notif-body{flex:1;min-width:0}
.notif-text{font-size:.78rem;color:var(--text-md);line-height:1.4}
.notif-time{font-family:var(--mono);font-size:.65rem;color:var(--text-lo);margin-top:2px}
.notif-btn-wrap{position:relative}

/* ─── PAGE TABS ───────────────────────────────────────────── */
.page-tabs{display:flex;gap:2px;background:var(--bg-surface);border:1px solid var(--border);border-radius:8px;padding:3px;width:fit-content}
.page-tab{padding:6px 14px;border-radius:6px;font-size:.8rem;cursor:pointer;color:var(--text-lo);transition:all .15s;user-select:none;}
.page-tab.active{background:var(--bg-raised);color:var(--text-hi);font-weight:500}

/* ─── PDV LAYOUT ──────────────────────────────────────────── */
.pdv-layout{display:grid;grid-template-columns:1fr 340px;gap:16px;flex:1;min-height:0;overflow:hidden;}
.pdv-left{display:flex;flex-direction:column;gap:12px;overflow:hidden;}
.pdv-right{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-lg);display:flex;flex-direction:column;overflow:hidden;}
.pdv-search-row{display:flex;gap:8px;}
.pdv-search{flex:1;background:var(--bg-raised);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:.85rem;color:var(--text-hi);font-family:var(--font);outline:none;transition:border .15s;}
.pdv-search:focus{border-color:var(--forge)}
.cat-tabs{display:flex;gap:4px;flex-wrap:wrap;}
.cat-tab{padding:5px 12px;border-radius:6px;font-size:.75rem;cursor:pointer;color:var(--text-lo);border:1px solid var(--border);background:var(--bg-raised);transition:all .15s;user-select:none;}
.cat-tab.active{border-color:var(--forge);color:var(--forge);background:var(--forge-faint)}
.pdv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;overflow-y:auto;flex:1;padding-right:4px;}
.pdv-grid::-webkit-scrollbar{width:4px}
.pdv-grid::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
.product-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;gap:8px;}
.product-card:hover{border-color:var(--forge);background:var(--bg-raised);transform:translateY(-1px)}
.product-card:active{transform:translateY(0)}
.product-card.disabled{opacity:.45;cursor:not-allowed;pointer-events:none}
.product-card-emoji{font-size:1.8rem;text-align:center;line-height:1}
.product-card-name{font-size:.78rem;font-weight:600;color:var(--text-hi);text-align:center;line-height:1.3}
.product-card-price{font-family:var(--mono);font-size:.82rem;color:var(--forge);text-align:center}
.cart-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.cart-title{font-family:var(--display);font-size:.9rem;font-weight:700;color:var(--text-hi)}
.cart-num{font-family:var(--mono);font-size:.72rem;color:var(--text-lo)}
.cart-items{flex:1;overflow-y:auto;padding:8px 0;}
.cart-items::-webkit-scrollbar{width:3px}
.cart-item{display:flex;align-items:center;gap:8px;padding:8px 16px;border-bottom:1px solid rgba(42,42,53,.5);}
.cart-item:last-child{border-bottom:none}
.cart-item-info{flex:1;min-width:0}
.cart-item-name{font-size:.78rem;color:var(--text-hi);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cart-item-price{font-family:var(--mono);font-size:.72rem;color:var(--text-lo)}
.cart-item-qty{display:flex;align-items:center;gap:4px;}
.qty-btn{width:22px;height:22px;border-radius:5px;border:1px solid var(--border);background:var(--bg-raised);cursor:pointer;display:grid;place-items:center;font-size:.8rem;color:var(--text-md);transition:all .1s;flex-shrink:0;}
.qty-btn:hover{border-color:var(--forge);color:var(--forge)}
.qty-val{font-family:var(--mono);font-size:.75rem;color:var(--text-hi);min-width:20px;text-align:center}
.cart-footer{border-top:1px solid var(--border);padding:14px 16px;display:flex;flex-direction:column;gap:8px;}
.cart-row{display:flex;justify-content:space-between;align-items:center;font-size:.8rem;color:var(--text-md);}
.cart-row.total{font-size:1rem;color:var(--text-hi);font-weight:600;font-family:var(--mono);}
.cart-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--text-lo);font-size:.82rem;}
.cart-empty-icon{font-size:2.5rem;opacity:.5}
.payment-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.pay-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 6px;border-radius:8px;border:1px solid var(--border);background:var(--bg-raised);cursor:pointer;transition:all .15s;}
.pay-btn:hover,.pay-btn.active{border-color:var(--forge);background:var(--forge-faint);color:var(--forge)}
.pay-btn svg,.pay-btn span{pointer-events:none}
.pay-btn .pay-icon{font-size:1.2rem}
.pay-btn .pay-label{font-size:.65rem;color:inherit;font-weight:500}

/* ─── KANBAN ──────────────────────────────────────────────── */
.kanban-board{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;overflow-x:auto;min-height:400px;align-items:start;}
.kanban-col{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;min-width:200px;}
.kanban-col-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.kanban-col-title{font-size:.8rem;font-weight:600;color:var(--text-hi)}
.kanban-count{font-family:var(--mono);font-size:.7rem;background:var(--bg-raised);border:1px solid var(--border);color:var(--text-lo);padding:1px 6px;border-radius:10px;}
.kanban-items{padding:8px;display:flex;flex-direction:column;gap:6px;min-height:100px;}
.kanban-card{background:var(--bg-raised);border:1px solid var(--border);border-radius:8px;padding:10px 12px;cursor:pointer;transition:border .15s;}
.kanban-card:hover{border-color:var(--border-hi)}
.kanban-card-id{font-family:var(--mono);font-size:.68rem;color:var(--text-lo);margin-bottom:4px}
.kanban-card-customer{font-size:.78rem;color:var(--text-hi);font-weight:500;margin-bottom:4px}
.kanban-card-meta{display:flex;align-items:center;justify-content:space-between;}
.kanban-card-val{font-family:var(--mono);font-size:.75rem;color:var(--text-md)}
.kanban-card-channel{font-size:.65rem}
.kanban-empty{padding:16px;text-align:center;color:var(--text-lo);font-size:.75rem}

/* ─── FILTER BAR ──────────────────────────────────────────── */
.filter-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--bg-raised);}
.filter-label{font-size:.72rem;color:var(--text-lo);font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.filter-select{background:var(--bg-surface);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:.75rem;color:var(--text-hi);font-family:var(--font);outline:none;cursor:pointer;}
.filter-select:focus{border-color:var(--forge)}
.filter-clear{font-size:.72rem;color:var(--text-lo);cursor:pointer;padding:5px 8px;border-radius:6px;transition:all .1s;}
.filter-clear:hover{background:var(--bg-hover);color:var(--text-hi)}

/* ─── PRODUCT GRID (Produtos module) ──────────────────────── */
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.product-mgmt-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:border .15s,transform .15s;}
.product-mgmt-card:hover{border-color:var(--border-hi);transform:translateY(-1px)}
.product-mgmt-card.inactive{opacity:.55}
.product-mgmt-img{height:80px;display:grid;place-items:center;font-size:2.5rem;background:var(--bg-raised);}
.product-mgmt-body{padding:12px 14px}
.product-mgmt-name{font-size:.85rem;font-weight:600;color:var(--text-hi);margin-bottom:3px}
.product-mgmt-cat{font-size:.7rem;color:var(--text-lo);margin-bottom:8px}
.product-mgmt-prices{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.product-mgmt-price{font-family:var(--mono);font-size:.9rem;color:var(--forge)}
.product-mgmt-cost{font-family:var(--mono);font-size:.72rem;color:var(--text-lo)}
.product-mgmt-actions{display:flex;gap:6px}

/* ─── INVENTORY / ESTOQUE ─────────────────────────────────── */
.inv-status-low{color:var(--err)}
.inv-status-ok{color:var(--ok)}
.inv-status-warn{color:var(--warn)}
.inv-bar{height:4px;background:var(--bg-raised);border-radius:2px;overflow:hidden;width:80px;}
.inv-fill{height:100%;border-radius:2px;transition:width .4s}

/* ─── FINANCEIRO ──────────────────────────────────────────── */
.fin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.stat-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px 20px;position:relative;overflow:hidden;}
.stat-card-label{font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text-lo);margin-bottom:8px}
.stat-card-value{font-family:var(--mono);font-size:1.5rem;color:var(--text-hi);font-weight:500}
.stat-card-sub{font-size:.72rem;color:var(--text-lo);margin-top:6px}
.stat-card.green{border-color:rgba(34,197,94,.3)}
.stat-card.red{border-color:rgba(239,68,68,.3)}
.stat-card.blue{border-color:rgba(56,189,248,.3)}
.stat-card.green .stat-card-value{color:var(--ok)}
.stat-card.red .stat-card-value{color:var(--err)}
.stat-card.blue .stat-card-value{color:var(--info)}

/* ─── DELIVERY ────────────────────────────────────────────── */
.delivery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.delivery-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;transition:border .15s;}
.delivery-card:hover{border-color:var(--border-hi)}
.delivery-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.delivery-card-id{font-family:var(--mono);font-size:.8rem;color:var(--text-hi);font-weight:600}
.delivery-timer{font-family:var(--mono);font-size:.75rem;color:var(--warn)}
.delivery-customer{font-size:.82rem;color:var(--text-hi);margin-bottom:4px}
.delivery-address{font-size:.75rem;color:var(--text-lo);margin-bottom:10px}
.delivery-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.delivery-val{font-family:var(--mono);font-size:.85rem;color:var(--forge)}
.delivery-status-pipeline{display:flex;gap:2px;margin:10px 0}
.pipeline-step{flex:1;height:4px;border-radius:2px;background:var(--bg-raised);}
.pipeline-step.done{background:var(--forge)}
.pipeline-step.current{background:var(--amber)}

/* ─── CLIENTES / CRM ──────────────────────────────────────── */
.customer-detail{display:grid;grid-template-columns:1fr 2fr;gap:20px}
.customer-profile{background:var(--bg-raised);border-radius:var(--radius-lg);padding:20px;text-align:center;}
.customer-avatar{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--forge),var(--amber));display:grid;place-items:center;font-family:var(--display);font-size:1.2rem;font-weight:700;color:var(--bg-void);margin:0 auto 12px;}
.customer-ltv{font-family:var(--mono);font-size:1.2rem;color:var(--forge);font-weight:500}

/* ─── CONFIGURAÇÕES ───────────────────────────────────────── */
.config-grid{display:grid;grid-template-columns:240px 1fr;gap:20px}
.config-nav{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:8px;height:fit-content;}
.config-nav-item{padding:9px 12px;border-radius:8px;cursor:pointer;font-size:.82rem;color:var(--text-md);transition:all .15s;margin-bottom:2px;}
.config-nav-item:hover{background:var(--bg-hover);color:var(--text-hi)}
.config-nav-item.active{background:var(--forge-faint);color:var(--forge)}
.config-section{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:22px}
.config-section-title{font-family:var(--display);font-size:1rem;font-weight:700;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(42,42,53,.4);}
.toggle-row:last-child{border-bottom:none}
.toggle-info .toggle-title{font-size:.82rem;color:var(--text-hi);font-weight:500}
.toggle-info .toggle-desc{font-size:.72rem;color:var(--text-lo);margin-top:2px}
.toggle{width:36px;height:20px;border-radius:10px;background:var(--border-hi);cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;}
.toggle.on{background:var(--forge)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform .2s;}
.toggle.on::after{transform:translateX(16px)}

/* ─── SCROLLBAR ───────────────────────────────────────────── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--mist)}

/* ─── ANIMATIONS ──────────────────────────────────────────── */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fadeUp{animation:fadeUp .3s both}
.kpi-card{animation:fadeUp .4s both}
.kpi-card:nth-child(1){animation-delay:.05s}.kpi-card:nth-child(2){animation-delay:.1s}
.kpi-card:nth-child(3){animation-delay:.15s}.kpi-card:nth-child(4){animation-delay:.2s}
.panel{animation:fadeUp .4s .25s both}

/* ─── RESPONSIVE ──────────────────────────────────────────── */
@media(max-width:1200px){
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .charts-grid{grid-template-columns:1fr}
  .bottom-grid{grid-template-columns:1fr}
  .pdv-layout{grid-template-columns:1fr 300px}
  .kanban-board{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:900px){
  .fin-grid{grid-template-columns:1fr 1fr}
  .pdv-layout{grid-template-columns:1fr}
  .pdv-right{height:320px}
  .config-grid{grid-template-columns:1fr}
}
@media(max-width:768px){
  .sidebar{position:fixed;transform:translateX(-100%);z-index:200;}
  .sidebar.open{transform:translateX(0);box-shadow:4px 0 24px rgba(0,0,0,.5);}
  .hamburger{display:flex}
  .kpi-grid{grid-template-columns:1fr 1fr}
  .kanban-board{grid-template-columns:repeat(2,minmax(200px,1fr))}
  .customer-detail{grid-template-columns:1fr}
  .topbar{padding:0 14px}
  .content{padding:16px}
}
@media(max-width:520px){.kpi-grid{grid-template-columns:1fr}}

/* ─── UTILITY ─────────────────────────────────────────────── */
.flex{display:flex}.items-center{align-items:center}.justify-between{justify-content:space-between}
.gap-8{gap:8px}.gap-12{gap:12px}.mt-12{margin-top:12px}.mb-12{margin-bottom:12px}
.empty-state{padding:48px 24px;text-align:center;color:var(--text-lo)}
.empty-state-icon{font-size:2.5rem;margin-bottom:12px;opacity:.5}
.empty-state-text{font-size:.85rem}
.overlay-bg{position:fixed;inset:0;z-index:150;}
</style>
</head>

      </div>
      <div class="nav-item" data-page="financeiro">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>

  destroyAll(){Object.keys(this.instances).forEach(k=>this.destroy(k));}
};

/* ─── TOAST ──────────────────────────────────────────────────── */
function toast(msg,type='success',icon){
  const icons={success:'✓',error:'✕',warning:'⚠',info:'ℹ'};
  const el=document.createElement('div');
  el.className=`toast ${type}`;
  el.innerHTML=`<span class="toast-icon">${icon||icons[type]}</span><span>${msg}</span>`;
  document.getElementById('toast-container').appendChild(el);
  requestAnimationFrame(()=>el.classList.add('show'));
  setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),350);},3200);
}

/* ─── MODAL ──────────────────────────────────────────────────── */
function openModal(title,body,footer='',size=''){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=body;
  document.getElementById('modal-footer').innerHTML=footer;
  const box=document.getElementById('modal-box');
  box.className='modal-box'+(size?' '+size:'');
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}

/* ─── SEARCH ─────────────────────────────────────────────────── */
function openSearch(){
  document.getElementById('search-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('search-input').focus(),50);
  onSearch('');
}
function closeSearch(){
  document.getElementById('search-overlay').classList.remove('open');
  document.getElementById('search-input').value='';
}
function onSearch(q){
  const el=document.getElementById('search-results');
  q=q.trim().toLowerCase();
  if(!q){
    el.innerHTML=`<div class="search-empty">Digite para buscar pedidos, produtos ou clientes</div>`;
    return;
  }
  const orders=S.orders.filter(o=>('#'+o.number).includes(q)||o.customerName.toLowerCase().includes(q)).slice(0,4);
  const prods=S.products.filter(p=>p.name.toLowerCase().includes(q)).slice(0,4);
  const custs=S.customers.filter(c=>c.name.toLowerCase().includes(q)||c.phone.includes(q)).slice(0,3);
  let html='';
  if(orders.length){html+=`<div class="search-group">Pedidos</div>`;
    orders.forEach(o=>html+=`<div class="search-result" onclick="closeSearch();navigate('pedidos')"><div class="search-result-icon">🛍️</div><div><div class="search-result-text">#${o.number} — ${o.customerName}</div><div class="search-result-sub">${fmt.brl(o.total)} · ${channelLabel(o.channel)}</div></div></div>`);}
  if(prods.length){html+=`<div class="search-group">Produtos</div>`;
    prods.forEach(p=>html+=`<div class="search-result" onclick="closeSearch();navigate('produtos')"><div class="search-result-icon">${p.emoji}</div><div><div class="search-result-text">${p.name}</div><div class="search-result-sub">${fmt.brl(p.price)} · ${p.cat}</div></div></div>`);}
  if(custs.length){html+=`<div class="search-group">Clientes</div>`;
    custs.forEach(c=>html+=`<div class="search-result" onclick="closeSearch();navigate('clientes')"><div class="search-result-icon">👤</div><div><div class="search-result-text">${c.name}</div><div class="search-result-sub">${c.phone}</div></div></div>`);}
  if(!html) html=`<div class="search-empty">Nenhum resultado encontrado para "${q}"</div>`;
  el.innerHTML=html;
}

/* ─── NOTIFICATIONS ──────────────────────────────────────────── */
function toggleNotif(){
  const dd=document.getElementById('notif-dropdown');
  dd.classList.toggle('open');
  if(dd.classList.contains('open')) renderNotifList();
}
function renderNotifList(){
  const el=document.getElementById('notif-list');
  const unread=S.notifications.filter(n=>!n.read).length;
  document.getElementById('notif-dot').style.display=unread>0?'block':'none';
  if(!S.notifications.length){el.innerHTML=`<div class="search-empty">Nenhuma notificação</div>`;return;}
  el.innerHTML=S.notifications.map(n=>`
    <div class="notif-item ${n.read?'':'unread'}" onclick="readNotif('${n.id}')">
      <div class="notif-icon" style="background:var(--bg-raised)">${n.icon}</div>
      <div class="notif-body"><div class="notif-text">${n.text}</div><div class="notif-time">${n.time}</div></div>
    </div>`).join('');
}
function readNotif(id){const n=S.notifications.find(x=>x.id===id);if(n)n.read=true;renderNotifList();store.save();}
function markAllRead(){S.notifications.forEach(n=>n.read=true);renderNotifList();store.save();}
function pushNotif(text,icon='📢',type='info'){
  S.notifications.unshift({id:uid(),text,time:'agora',icon,type,read:false});
  document.getElementById('notif-dot').style.display='block';
  store.save();
}

/* ─── SIDEBAR ─────────────────────────────────────────────────── */
function toggleSidebar(){
  const sb=document.getElementById('sidebar');
  const ov=document.getElementById('sidebar-overlay');
  sb.classList.toggle('open');
  ov.style.display=sb.classList.contains('open')?'block':'none';
}
function updateSidebar(){
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.classList.toggle('active',el.dataset.page===S.page);
  });
  const pend=S.orders.filter(o=>o.status==='pendente').length;
  const deliv=S.orders.filter(o=>['confirmado','preparando','rota'].includes(o.status)&&o.channel!=='balcao').length;
  const bp=document.getElementById('badge-pedidos');
  const bd=document.getElementById('badge-delivery');
  if(bp) bp.textContent=pend;
  if(bd) bd.textContent=deliv;
}

const PAGE_TITLES={'dashboard':'Dashboard','pedidos':'Pedidos','pdv':'PDV / Caixa','produtos':'Produtos','estoque':'Estoque','clientes':'Clientes (CRM)','financeiro':'Financeiro','delivery':'Delivery / iFood','relatorios':'Relatórios BI','config':'Configurações'};
function navigate(page){
  chartMgr.destroyAll();
  S.page=page;
  document.getElementById('topbar-title').textContent=PAGE_TITLES[page]||page;
  updateSidebar();
  const app=document.getElementById('app');
  app.innerHTML=pages[page]?pages[page]():'<div class="content"><p>Página não encontrada</p></div>';
  if(ctrl[page]) setTimeout(()=>ctrl[page](),0);
  const sb=document.getElementById('sidebar');
  if(sb.classList.contains('open')){sb.classList.remove('open');document.getElementById('sidebar-overlay').style.display='none';}
}

function statusBadge(st){
  const map={pendente:['badge-yellow','Pendente'],confirmado:['badge-info','Confirmado'],preparando:['badge-orange','Preparando'],rota:['badge-blue','Em Rota'],entregue:['badge-green','Entregue'],cancelado:['badge-red','Cancelado']};
  const [cls,label]=map[st]||['badge-gray',st];
  return `<span class="badge ${cls}"><span class="badge-dot"></span>${label}</span>`;
}
function catLabel(c){return{lanches:'Lanches',acompanhamentos:'Acompanhamentos',bebidas:'Bebidas',combos:'Combos',sobremesas:'Sobremesas',todos:'Todos'}[c]||c}

pages.dashboard = () => {

  /* ── KPIs reais: compara últimos 7 dias vs 7 dias anteriores ── */
  const now=new Date();
  const d7=new Date(now-7*24*60*60*1000);
  const d14=new Date(now-14*24*60*60*1000);

  const cur7=entregues.filter(o=>new Date(o.createdAt)>=d7);
  const prev7=entregues.filter(o=>{const t=new Date(o.createdAt);return t>=d14&&t<d7;});

  const receita=cur7.reduce((a,o)=>a+o.total,0);
  const receitaPrev=prev7.reduce((a,o)=>a+o.total,0);
  const receitaDelta=receitaPrev>0?((receita-receitaPrev)/receitaPrev*100):0;

  const totalOrders=S.orders.length;
  const ordersAtual=cur7.length;
  const ordersPrev=prev7.length;
  const ordersDelta=ordersPrev>0?((ordersAtual-ordersPrev)/ordersPrev*100):0;

  const ticket=ordersAtual>0?receita/ordersAtual:0;
  const ticketPrev=ordersPrev>0?receitaPrev/ordersPrev:0;
  const ticketDelta=ticketPrev>0?((ticket-ticketPrev)/ticketPrev*100):0;

  const clientes=S.customers.length;
  const newClientes=S.customers.filter(c=>new Date(c.since)>=d7).length;
  const prevNewClientes=S.customers.filter(c=>{const t=new Date(c.since);return t>=d14&&t<d7;}).length;
  const clientesDelta=newClientes-prevNewClientes;

  const fmtDeltaPct=(v)=>{
    const sign=v>=0?'▲':'▼';
    const cls=v>=0?'up':'down';
    return `<span class="kpi-delta ${cls}">${sign} ${v>=0?'+':''}${v.toFixed(1)}%</span>`;
  };
  const fmtDeltaNum=(v)=>{
    const sign=v>=0?'▲':'▼';
    const cls=v>=0?'up':'down';
    return `<span class="kpi-delta ${cls}">${sign} ${v>=0?'+':''}${v}</span>`;
  };

  <div class="page-title">
    <div>
      <h1>Visão <span>Geral</span></h1>
      <div class="page-subtitle">${weekday.charAt(0).toUpperCase()+weekday.slice(1)}, ${dateStr} · ${city}</div>
    </div>
    <div class="page-actions">
      <div class="range-tabs" id="range-tabs">
        <div class="range-tab" data-range="hoje">Hoje</div>
        <div class="range-tab active" data-range="semana">7 dias</div>
        <div class="range-tab" data-range="mes">30 dias</div>
        <div class="range-tab" data-range="ano">Mês</div>
      </div>
      <button class="btn btn-ghost" onclick="exportCSV()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Exportar
      </button>
      <button class="btn btn-forge" onclick="openNewOrderModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Novo Pedido
      </button>
    </div>
  </div>

  <div class="kpi-grid">
    <div class="kpi-card forge">
      <div class="kpi-label"><div class="kpi-icon" style="background:rgba(249,115,22,.15)"><svg viewBox="0 0 24 24" fill="none" stroke="var(--forge)" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg></div>Receita Total</div>
      <div class="kpi-value forge-text">${fmt.brl(receita)}</div>
      <div class="kpi-footer">${fmtDeltaPct(receitaDelta)}<span class="kpi-period">vs semana anterior</span></div>
      <svg class="kpi-sparkline" viewBox="0 0 80 40" preserveAspectRatio="none"><polyline points="0,35 13,28 26,30 39,20 52,22 65,12 80,8" fill="none" stroke="var(--forge)" stroke-width="1.5"/></svg>
    </div>
    <div class="kpi-card">
      <div class="kpi-label"><div class="kpi-icon" style="background:rgba(56,189,248,.1)"><svg viewBox="0 0 24 24" fill="none" stroke="var(--info)" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg></div>Pedidos</div>
      <div class="kpi-value">${fmt.num(totalOrders)}</div>
      <div class="kpi-footer">${fmtDeltaPct(ordersDelta)}<span class="kpi-period">vs semana anterior</span></div>
      <svg class="kpi-sparkline" viewBox="0 0 80 40" preserveAspectRatio="none"><polyline points="0,32 13,29 26,26 39,28 52,18 65,15 80,12" fill="none" stroke="var(--info)" stroke-width="1.5"/></svg>
    </div>
    <div class="kpi-card">
      <div class="kpi-label"><div class="kpi-icon" style="background:rgba(34,197,94,.1)"><svg viewBox="0 0 24 24" fill="none" stroke="var(--ok)" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg></div>Clientes Ativos</div>
      <div class="kpi-value">${clientes}</div>
      <div class="kpi-footer">${fmtDeltaNum(clientesDelta)}<span class="kpi-period">novos esta semana (${newClientes})</span></div>
      <svg class="kpi-sparkline" viewBox="0 0 80 40" preserveAspectRatio="none"><polyline points="0,36 13,34 26,30 39,27 52,22 65,18 80,14" fill="none" stroke="var(--ok)" stroke-width="1.5"/></svg>
    </div>
    <div class="kpi-card">
      <div class="kpi-label"><div class="kpi-icon" style="background:rgba(234,179,8,.1)"><svg viewBox="0 0 24 24" fill="none" stroke="var(--amber)" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>Ticket Médio</div>

      <div class="kpi-footer">${fmtDeltaPct(ticketDelta)}<span class="kpi-period">vs semana anterior</span></div>
      <svg class="kpi-sparkline" viewBox="0 0 80 40" preserveAspectRatio="none"><polyline points="0,18 13,16 26,20 39,17 52,22 65,24 80,26" fill="none" stroke="var(--amber)" stroke-width="1.5"/></svg>
    </div>
  </div>

  <div class="charts-grid">
    <div class="panel">
      <div class="panel-header">
        <div><div class="panel-title">Receita por Período</div><div class="panel-sub">Comparativo com período anterior</div></div>
        <div class="panel-actions" id="chart-micro-tabs">
          <button class="micro-btn active" data-period="semana">Semanal</button>
          <button class="micro-btn" data-period="mes">Mensal</button>
          <button class="micro-btn" data-period="ano">Anual</button>

      <div class="summary-row" id="summary-row">
        <div class="summary-cell"><div class="summary-label">Seg–Ter</div><div class="summary-val forge">R$ 13.240</div></div>
        <div class="summary-cell"><div class="summary-label">Qua–Qui</div><div class="summary-val">R$ 15.870</div></div>
        <div class="summary-cell"><div class="summary-label">Sex–Sáb</div><div class="summary-val">R$ 16.490</div></div>
        <div class="summary-cell"><div class="summary-label">Dom</div><div class="summary-val">R$ 2.770</div></div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-header"><div><div class="panel-title">Mix de Canais</div><div class="panel-sub">Participação de vendas</div></div></div>

        </table>

    </div>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div class="panel">
        <div class="panel-header"><div><div class="panel-title">Top Produtos</div><div class="panel-sub">Ranking da semana</div></div></div>
        <div class="panel-body" style="padding-top:8px;padding-bottom:8px"><div id="top-produtos"></div></div>

      <div class="panel">

        <div class="panel-body" style="padding-top:8px;padding-bottom:8px"><div class="activity-list" id="activity-list"></div></div>
      </div>
    </div>
  </div>`;
};

      <div class="delivery-card">
        <div class="delivery-card-header">
          <span class="delivery-card-id">#${o.number}</span>

function buildRevenueChart(period){
  chartMgr.destroy('revenue');
  const ctx=document.getElementById('revenueChart');
  if(!ctx) return;
  const d=CHART_DATA.revenue[period]||CHART_DATA.revenue.semana;
  const rCtx=ctx.getContext('2d');
  const gF=rCtx.createLinearGradient(0,0,0,220);
  gF.addColorStop(0,'rgba(249,115,22,.7)');gF.addColorStop(1,'rgba(249,115,22,.05)');
  const gP=rCtx.createLinearGradient(0,0,0,220);
  gP.addColorStop(0,'rgba(71,85,105,.5)');gP.addColorStop(1,'rgba(71,85,105,.05)');
  chartMgr.instances.revenue=new Chart(rCtx,{
    type:'bar',
    data:{labels:d.labels,datasets:[
      {label:'Atual',data:d.atual,backgroundColor:gF,borderColor:'rgba(249,115,22,.8)',borderWidth:1,borderRadius:5,borderSkipped:false},
      {label:'Anterior',data:d.anterior,backgroundColor:gP,borderColor:'rgba(71,85,105,.5)',borderWidth:1,borderRadius:5,borderSkipped:false}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'top',labels:{boxWidth:10,boxHeight:10,borderRadius:3,usePointStyle:true,pointStyle:'rect',color:'#64748b',padding:16,font:{family:"'DM Mono'",size:10}}},
        tooltip:{backgroundColor:'#1f1f27',borderColor:'#3d3d50',borderWidth:1,titleColor:'#f1f5f9',bodyColor:'#94a3b8',padding:10,cornerRadius:8,callbacks:{label:ctx=>' '+fmt.brl(ctx.raw)}}},
      scales:{x:{grid:{display:false},ticks:{color:'#475569'}},y:{grid:{color:'rgba(42,42,53,.6)'},ticks:{color:'#475569',callback:v=>v>=1000?'R$'+(v/1000).toFixed(0)+'k':'R$'+v}}}}
  });
}

function buildChannelDonut(){
  chartMgr.destroy('channel');
  const ctx=document.getElementById('channelDonut');
  if(!ctx) return;
  const total=S.orders.filter(o=>o.status==='entregue').length||1;
  const counts=['ifood','balcao','whatsapp','app'].map(ch=>S.orders.filter(o=>o.channel===ch&&o.status==='entregue').length);
  chartMgr.instances.channel=new Chart(ctx.getContext('2d'),{
    type:'doughnut',
    data:{labels:['iFood','Balcão','WhatsApp','App'],
      datasets:[{data:counts,backgroundColor:['#f97316','#38bdf8','#22c55e','#fbbf24'],borderColor:'#18181d',borderWidth:3}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'72%',
      plugins:{legend:{display:false},tooltip:{backgroundColor:'#1f1f27',borderColor:'#3d3d50',borderWidth:1,titleColor:'#f1f5f9',bodyColor:'#94a3b8',padding:10,cornerRadius:8,
        callbacks:{label:ctx=>`${ctx.label}: ${ctx.raw} (${Math.round(ctx.raw/total*100)}%)`}}}}
  });
}

ctrl.pedidos = () => {

  S.ordersFilter.status=document.getElementById('filter-status').value;
  renderOrdersContent();
}
function clearOrderFilter(){
  S.ordersFilter={channel:'',status:''};
  document.getElementById('filter-channel').value='';
  document.getElementById('filter-status').value='';
  renderOrdersContent();
}
function getFilteredOrders(){
  return S.orders.filter(o=>{
    if(S.ordersFilter.channel&&o.channel!==S.ordersFilter.channel) return false;
    if(S.ordersFilter.status&&o.status!==S.ordersFilter.status) return false;
    return true;
  });
}
function renderOrdersContent(){
  const el=document.getElementById('orders-content');
  if(!el) return;
  if(S.ordersView==='kanban') el.innerHTML=renderKanban();
  else el.innerHTML=renderOrdersList();
}
function renderOrdersList(){
  const orders=getFilteredOrders();
  if(!orders.length) return `<div class="empty-state"><div class="empty-state-icon">📭</div><div class="empty-state-text">Nenhum pedido encontrado</div></div>`;
  return `<div style="overflow-x:auto"><table class="data-table">

      <td class="text-hi">${o.customerName}</td>

      <td class="mono">${o.items.reduce((a,i)=>a+i.qty,0)}</td>
      <td class="mono text-hi">${fmt.brl(o.total)}</td>
      <td>${statusBadge(o.status)}</td>
      <td class="mono" style="color:var(--text-lo)">${fmt.dt(o.createdAt)}</td>

    </tr>`).join('')}</tbody>
  </table></div>`;

function renderKanban(){

    {key:'pendente',label:'Pendente',color:'var(--warn)'},
    {key:'confirmado',label:'Confirmado',color:'var(--info)'},
    {key:'preparando',label:'Preparando',color:'var(--forge)'},
    {key:'rota',label:'Em Rota',color:'var(--ok)'},
    {key:'entregue',label:'Entregue',color:'var(--steel)'},
  ];
  const orders=getFilteredOrders();
  return `<div style="overflow-x:auto;padding:16px"><div class="kanban-board">

        <div class="kanban-col-header">

              </div>
            </div>`).join('')
          :`<div class="kanban-empty">Nenhum pedido</div>`}
        </div>
      </div>`;
    }).join('')}

function openOrderDetail(id){
  const o=S.orders.find(x=>x.id===id);
  if(!o) return;
  const nextStatus={pendente:'confirmado',confirmado:'preparando',preparando:'rota',rota:'entregue'};
  const ns=nextStatus[o.status];
  openModal(`Pedido #${o.number}`,`
    <div style="display:flex;flex-direction:column;gap:14px">
      <div style="display:flex;gap:10px;flex-wrap:wrap">${channelBadge(o.channel)} ${statusBadge(o.status)}</div>

        <div><b style="color:var(--text-hi)">Pagamento</b><br>${o.payment||'—'}</div>
        <div><b style="color:var(--text-hi)">Data/Hora</b><br>${fmt.dt(o.createdAt)}</div>
        <div><b style="color:var(--text-hi)">Total</b><br><span style="color:var(--forge);font-family:var(--mono);font-size:1rem">${fmt.brl(o.total)}</span></div>
      </div>
      <div>
        <div style="font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-lo);margin-bottom:8px">Itens</div>
        ${o.items.map(it=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:.82rem">
          <span style="color:var(--text-hi)">${it.name} <span style="color:var(--text-lo)">× ${it.qty}</span></span>
          <span class="mono" style="color:var(--forge)">${fmt.brl(it.total)}</span>
        </div>`).join('')}
      </div>
    </div>`,
    `${ns&&o.status!=='cancelado'?`<button class="btn btn-forge" onclick="advanceOrder('${o.id}','${ns}')">→ ${statusBadge(ns)}</button>`:''}
     ${o.status!=='cancelado'&&o.status!=='entregue'?`<button class="btn btn-err" onclick="advanceOrder('${o.id}','cancelado')">Cancelar</button>`:''}
     <button class="btn btn-ghost" onclick="printReceipt('${o.id}')">🖨 Imprimir</button>
     <button class="btn btn-ghost" onclick="closeModal()">Fechar</button>`
  );
}
function advanceOrder(id,newStatus){
  const o=S.orders.find(x=>x.id===id);
  if(!o) return;
  o.status=newStatus;
  store.save();

  toast(`Pedido #${o.number} → ${newStatus}`,'success');

/* ─── PDV CTRL ────────────────────────────────────────────────── */
let selectedPayment='dinheiro';
ctrl.pdv = () => {
  const st=document.getElementById('caixa-status');
  const btn=document.getElementById('btn-caixa');
  if(S.cashOpen){
    if(st) st.textContent=`Caixa aberto às ${fmt.time(S.cashOpen)} · Saldo inicial: ${fmt.brl(200)}`;
    if(btn) btn.textContent='Fechar Caixa';
  } else {
    if(st) st.textContent='Caixa fechado';
    if(btn) btn.textContent='Abrir Caixa';
  }
  const ct=document.getElementById('cat-tabs');
  if(ct){
    const cats=['todos','lanches','acompanhamentos','bebidas','combos','sobremesas'];
    ct.innerHTML=cats.map(c=>`<div class="cat-tab ${S.pdvCat===c?'active':''}" onclick="setPdvCat('${c}')">${catLabel(c)}</div>`).join('');
  }
  renderPdvGrid();
  renderCart();
};
function setPdvCat(cat){
  S.pdvCat=cat;
  document.querySelectorAll('.cat-tab').forEach(t=>t.classList.toggle('active',t.textContent===catLabel(cat)));
  renderPdvGrid();
}
function renderPdvGrid(){
  const g=document.getElementById('pdv-grid');
  if(!g) return;
  const q=(document.getElementById('pdv-search')?.value||'').toLowerCase();
  const prods=S.products.filter(p=>{
    if(!p.active) return false;
    if(S.pdvCat!=='todos'&&p.cat!==S.pdvCat) return false;
    if(q&&!p.name.toLowerCase().includes(q)) return false;
    return true;
  });
  if(!prods.length){g.innerHTML=`<div class="empty-state" style="grid-column:span 5"><div class="empty-state-icon">🔍</div><div class="empty-state-text">Nenhum produto encontrado</div></div>`;return;}
  g.innerHTML=prods.map(p=>`
    <div class="product-card" onclick="addToCart('${p.id}')">
      <div class="product-card-emoji">${p.emoji}</div>
      <div class="product-card-name">${p.name}</div>
      <div class="product-card-price">${fmt.brl(p.price)}</div>
    </div>`).join('');
}
function addToCart(pid){
  if(!S.cashOpen){toast('Abra o caixa antes de vender','warning','⚠');return;}
  const p=S.products.find(x=>x.id===pid);
  if(!p) return;
  const ex=S.cart.find(i=>i.productId===pid);
  if(ex) ex.qty++;
  else S.cart.push({productId:pid,name:p.name,emoji:p.emoji,qty:1,unitPrice:p.price});
  renderCart();
  store.save();
}
function changeQty(pid,delta){
  const idx=S.cart.findIndex(i=>i.productId===pid);
  if(idx<0) return;
  S.cart[idx].qty+=delta;
  if(S.cart[idx].qty<=0) S.cart.splice(idx,1);
  renderCart();
  store.save();
}
function clearCart(){S.cart=[];renderCart();store.save();}
function renderCart(){
  const ci=document.getElementById('cart-items');
  const cn=document.getElementById('cart-num');
  const cs=document.getElementById('cart-subtotal');
  const ct=document.getElementById('cart-total');
  if(!ci) return;
  const totalItems=S.cart.reduce((a,i)=>a+i.qty,0);
  const total=S.cart.reduce((a,i)=>a+i.qty*i.unitPrice,0);
  if(cn) cn.textContent=`${totalItems} ${totalItems===1?'item':'itens'}`;
  if(cs) cs.textContent=fmt.brl(total);
  if(ct) ct.textContent=fmt.brl(total);
  if(!S.cart.length){
    ci.innerHTML=`<div class="cart-empty"><div class="cart-empty-icon">🛒</div><span>Carrinho vazio</span><span style="font-size:.72rem;color:var(--text-lo)">Clique em um produto para adicionar</span></div>`;
    return;
  }
  ci.innerHTML=S.cart.map(item=>`
    <div class="cart-item">
      <div class="cart-item-info">
        <div class="cart-item-name">${item.emoji} ${item.name}</div>
        <div class="cart-item-price">${fmt.brl(item.unitPrice)} cada</div>
      </div>
      <div class="cart-item-qty">
        <div class="qty-btn" onclick="changeQty('${item.productId}',-1)">−</div>
        <span class="qty-val">${item.qty}</span>
        <div class="qty-btn" onclick="changeQty('${item.productId}',1)">+</div>
      </div>
    </div>`).join('');
}
function selectPayment(el){
  document.querySelectorAll('.pay-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  selectedPayment=el.dataset.pay;
}
function toggleCaixa(){
  if(S.cashOpen){
    openModal('Fechar Caixa',`<div style="font-size:.85rem;color:var(--text-md)"><p>Confirmar fechamento do caixa?</p><div style="margin-top:12px;display:flex;justify-content:space-between"><span>Saldo inicial</span><span class="mono">${fmt.brl(200)}</span></div></div>`,
      `<button class="btn btn-forge" onclick="closeCaixa()">Fechar Caixa</button><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>`,'sm');
  } else {
    openModal('Abrir Caixa',`<div class="form-row full"><div class="form-group"><label class="form-label">Saldo Inicial (R$)</label><input class="form-input" id="open-balance" type="number" value="200" step="0.01"></div></div>`,
      `<button class="btn btn-forge" onclick="openCaixa()">Confirmar Abertura</button><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>`,'sm');
  }
}
function openCaixa(){
  S.cashOpen=new Date().toISOString();
  store.save();closeModal();
  toast('Caixa aberto com sucesso!','success','💰');
  ctrl.pdv();
}
function closeCaixa(){
  S.cashOpen=null;store.save();closeModal();

  ctrl.pdv();
}
function finalizarPedido(){
  if(!S.cashOpen){toast('Abra o caixa primeiro','warning','⚠');return;}
  if(!S.cart.length){toast('Carrinho vazio','warning','⚠');return;}
  const total=S.cart.reduce((a,i)=>a+i.qty*i.unitPrice,0);
  if(selectedPayment==='dinheiro'){
    openModal('Pagamento em Dinheiro',`
      <div style="text-align:center;margin-bottom:16px"><div style="font-family:var(--mono);font-size:1.8rem;color:var(--forge)">${fmt.brl(total)}</div><div style="font-size:.8rem;color:var(--text-lo)">Total a cobrar</div></div>
      <div class="form-row full"><div class="form-group"><label class="form-label">Valor Recebido (R$)</label><input class="form-input" id="cash-received" type="number" step="0.01" placeholder="${total.toFixed(2)}" oninput="calcTroco(${total})"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:.9rem;margin-top:8px"><span style="color:var(--text-md)">Troco</span><span id="troco" class="mono" style="color:var(--ok);font-size:1rem">R$ 0,00</span></div>`,

function calcTroco(total){

    status:'entregue',createdAt:new Date().toISOString(),payment:selectedPayment
  };
  S.orders.unshift(order);
  S.transactions.unshift({id:uid(),type:'entrada',desc:`Venda #${order.number} (Balcão)`,amount:total,date:new Date().toISOString().split('T')[0],cat:'vendas'});

      <div style="font-family:var(--mono);font-size:1.5rem;color:var(--forge);margin-bottom:6px">${fmt.brl(total)}</div>
      <div style="font-size:.82rem;color:var(--text-lo)">Pagamento: ${selectedPayment} · #${order.number}</div>
    </div>`,
    `<button class="btn btn-ghost" onclick="printReceipt('${order.id}')">🖨 Imprimir Comanda</button>
     <button class="btn btn-forge" onclick="closeModal()">Concluir</button>`,'sm');

ctrl.estoque = () => renderInventory();
function renderInventory(){
  const tb=document.getElementById('inv-tbody');
  if(!tb) return;
  tb.innerHTML=S.inventory.map(i=>{
    const pct=Math.min(100,Math.round(i.qty/Math.max(i.minQty*2,1)*100));
    const status=i.qty<=0?'err':i.qty<=i.minQty?'err':i.qty<=i.minQty*1.5?'warn':'ok';
    const label={err:'Crítico',warn:'Baixo',ok:'Normal'}[status];
    const color={err:'var(--err)',warn:'var(--warn)',ok:'var(--ok)'}[status];
    return `<tr>
      <td class="text-hi">${i.name}</td>
      <td class="mono">${i.unit}</td>
      <td class="mono" style="color:${color}">${i.qty}</td>
      <td class="mono" style="color:var(--text-lo)">${i.minQty}</td>
      <td><div class="inv-bar"><div class="inv-fill" style="width:${pct}%;background:${color}"></div></div></td>
      <td><span class="badge ${status==='ok'?'badge-green':status==='warn'?'badge-yellow':'badge-red'}">${label}</span></td>
      <td>
        <button class="micro-btn" onclick="adjInventory('${i.id}',1)">+ Entrada</button>
        <button class="micro-btn" onclick="adjInventory('${i.id}',-1)">− Saída</button>
        <button class="micro-btn" onclick="openInventoryModal('${i.id}')">✏</button>
      </td>
    </tr>`;
  }).join('');
}
function adjInventory(id,dir){
  const i=S.inventory.find(x=>x.id===id);
  if(!i) return;
  openModal(`${dir>0?'Entrada':'Saída'} — ${i.name}`,`
    <div class="form-row full"><div class="form-group"><label class="form-label">Quantidade (${i.unit})</label><input class="form-input" id="inv-qty" type="number" step="1" min="1" placeholder="0"></div></div>`,
    `<button class="btn btn-forge" onclick="saveInvAdj('${id}',${dir})">Confirmar</button><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>`,'sm');
}
function saveInvAdj(id,dir){
  const qty=parseFloat(document.getElementById('inv-qty').value);
  if(!qty||qty<=0) return toast('Informe uma quantidade válida','warning','⚠');
  const i=S.inventory.find(x=>x.id===id);
  i.qty=Math.max(0,i.qty+(qty*dir));
  store.save();closeModal();renderInventory();
  toast(`${i.name}: ${dir>0?'+':'-'}${qty} ${i.unit}`,'success');
}
function openInventoryModal(id){
  const i=id?S.inventory.find(x=>x.id===id):null;
  openModal(i?`Editar ${i.name}`:'Novo Insumo',`
    <div class="form-row"><div class="form-group"><label class="form-label">Nome</label><input class="form-input" id="inv-name" value="${i?.name||''}"></div>
    <div class="form-group"><label class="form-label">Unidade</label><input class="form-input" id="inv-unit" value="${i?.unit||'un'}" placeholder="un / kg / L"></div></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Qtd. Atual</label><input class="form-input" id="inv-cur" type="number" step="0.1" value="${i?.qty||0}"></div>
      <div class="form-group"><label class="form-label">Qtd. Mínima</label><input class="form-input" id="inv-min" type="number" step="0.1" value="${i?.minQty||5}"></div>
    </div>`,
    `<button class="btn btn-forge" onclick="saveInventoryItem('${id||''}')">Salvar</button><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>`
  );
}
function saveInventoryItem(id){
  const name=document.getElementById('inv-name').value.trim();
  const unit=document.getElementById('inv-unit').value.trim()||'un';
  const qty=parseFloat(document.getElementById('inv-cur').value)||0;
  const minQty=parseFloat(document.getElementById('inv-min').value)||5;
  if(!name) return toast('Informe um nome','warning','⚠');
  if(id){
    const i=S.inventory.find(x=>x.id===id);
    Object.assign(i,{name,unit,qty,minQty});
    toast('Insumo atualizado','success');
  } else {
    S.inventory.push({id:uid(),name,unit,qty,minQty,cost:0});
    toast('Insumo cadastrado','success');
  }
  store.save();closeModal();renderInventory();
}
