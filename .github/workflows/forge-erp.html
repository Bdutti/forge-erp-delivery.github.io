        <div class="form-row"><div class="form-group"><label class="form-label">Abre às</label><input class="form-input" id="cfg-open" type="time" value="${s.openTime||'11:00'}"></div>
        <div class="form-group"><label class="form-label">Fecha às</label><input class="form-input" id="cfg-close" type="time" value="${s.closeTime||'23:00'}"></div></div>
        <button class="btn btn-forge" onclick="saveConfig()">Salvar Configurações</button>
      </div>`,
    integracoes:`
      <div class="config-section">
        <div class="config-section-title">🔗 Integrações</div>
        <div class="form-row full"><div class="form-group"><label class="form-label">iFood Merchant ID</label><input class="form-input" placeholder="ex: 123456789" value=""></div></div>
        <div class="form-row full"><div class="form-group"><label class="form-label">iFood Client ID</label><input class="form-input" placeholder="UUID do app" value=""></div></div>
        <div class="form-row full"><div class="form-group"><label class="form-label">WhatsApp Business API Token</label><input class="form-input" placeholder="Bearer token" value=""></div></div>
        <div class="form-row full"><div class="form-group"><label class="form-label">Google Sheets ID (sync)</label><input class="form-input" placeholder="ID da planilha" value=""></div></div>
        <button class="btn btn-ghost">Testar Conexão</button>
      </div>`,
    notificacoes:`
      <div class="config-section">
        <div class="config-section-title">🔔 Notificações</div>
        <div class="toggle-row"><div class="toggle-info"><div class="toggle-title">Novo Pedido</div><div class="toggle-desc">Alerta ao receber pedido</div></div><div class="toggle ${s.notifNewOrder?'on':''}" onclick="toggleCfg(this,'notifNewOrder')"></div></div>
        <div class="toggle-row"><div class="toggle-info"><div class="toggle-title">Estoque Baixo</div><div class="toggle-desc">Alerta ao atingir mínimo</div></div><div class="toggle ${s.notifLowStock?'on':''}" onclick="toggleCfg(this,'notifLowStock')"></div></div>
        <div class="toggle-row"><div class="toggle-info"><div class="toggle-title">Atraso na Entrega</div><div class="toggle-desc">Alerta após 45 min em rota</div></div><div class="toggle ${s.notifDelay?'on':''}" onclick="toggleCfg(this,'notifDelay')"></div></div>
      </div>`,
    usuario:`
      <div class="config-section">
        <div class="config-section-title">👤 Perfil do Usuário</div>
        <div class="form-row"><div class="form-group"><label class="form-label">Nome</label><input class="form-input" id="cfg-uname" value="${s.adminName||'Túlio Bdutti'}"></div>
        <div class="form-group"><label class="form-label">E-mail</label><input class="form-input" id="cfg-email" type="email" value="${s.adminEmail||''}"></div></div>
        <div class="form-row"><div class="form-group"><label class="form-label">Nova Senha</label><input class="form-input" type="password" placeholder="••••••••"></div>
        <div class="form-group"><label class="form-label">Confirmar Senha</label><input class="form-input" type="password" placeholder="••••••••"></div></div>
        <button class="btn btn-forge" onclick="saveUserConfig()">Salvar Perfil</button>
      </div>`
  };
  el.innerHTML=sections[section]||'';
}
function saveConfig(){
  const s=S.settings;
  s.businessName=document.getElementById('cfg-name')?.value||s.businessName;
  s.cnpj=document.getElementById('cfg-cnpj')?.value||s.cnpj;
  s.address=document.getElementById('cfg-addr')?.value||s.address;
  s.phone=document.getElementById('cfg-phone')?.value||s.phone;
  s.ifoodCommission=parseFloat(document.getElementById('cfg-ifood')?.value)||s.ifoodCommission;
  s.openTime=document.getElementById('cfg-open')?.value||s.openTime;
  s.closeTime=document.getElementById('cfg-close')?.value||s.closeTime;
  store.save();toast('Configurações salvas','success','✓');
}
function saveUserConfig(){
  const name=document.getElementById('cfg-uname')?.value;
  const email=document.getElementById('cfg-email')?.value;
  if(name) S.settings.adminName=name;
  if(email) S.settings.adminEmail=email;
  document.getElementById('user-name').textContent=name||S.settings.adminName;
  document.getElementById('user-avatar').textContent=fmt.initials(name||'TB');
  store.save();toast('Perfil atualizado','success','✓');
}
function toggleCfg(el,key){
  el.classList.toggle('on');
  S.settings[key]=el.classList.contains('on');
  store.save();
}

/* ─── NEW ORDER MODAL ─────────────────────────────────────────── */
function openNewOrderModal(){
  const custOptions=S.customers.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
  const prodChecks=S.products.filter(p=>p.active).map(p=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)"><input type="checkbox" id="np-${p.id}" style="accent-color:var(--forge)"><label for="np-${p.id}" style="font-size:.8rem;flex:1;color:var(--text-hi)">${p.emoji} ${p.name}</label><span style="font-family:var(--mono);font-size:.75rem;color:var(--forge)">${fmt.brl(p.price)}</span></div>`).join('');
  openModal('Novo Pedido',`
    <div class="form-row"><div class="form-group"><label class="form-label">Cliente</label><select class="form-select" id="np-cust"><option value="">Selecione...</option>${custOptions}<option value="balcao">Balcão (sem cadastro)</option></select></div>
    <div class="form-group"><label class="form-label">Canal</label><select class="form-select" id="np-channel"><option value="balcao">Balcão</option><option value="ifood">iFood</option><option value="whatsapp">WhatsApp</option><option value="app">App</option></select></div></div>
    <div class="form-group" style="margin-bottom:10px"><label class="form-label">Itens</label><div style="max-height:220px;overflow-y:auto">${prodChecks}</div></div>`,
    `<button class="btn btn-forge" onclick="saveNewOrder()">Criar Pedido</button><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>`,'lg'
  );
}
function saveNewOrder(){
  const custId=document.getElementById('np-cust').value;
  const channel=document.getElementById('np-channel').value;
  const cust=S.customers.find(c=>c.id===custId);
  const items=[];
  S.products.filter(p=>p.active).forEach(p=>{
    const cb=document.getElementById('np-'+p.id);
    if(cb?.checked) items.push({productId:p.id,name:p.name,qty:1,unitPrice:p.price,total:p.price});
  });
  if(!items.length) return toast('Selecione ao menos um produto','warning','⚠');
  const total=items.reduce((a,i)=>a+i.total,0);
  const order={id:uid(),number:S.nextOrderNum++,customerId:custId,customerName:cust?.name||'Balcão',channel,items,total:+total.toFixed(2),status:'pendente',createdAt:new Date().toISOString(),payment:'pendente'};
  S.orders.unshift(order);
  if(cust){cust.orderCount++;cust.ltv+=total;}
  store.save();closeModal();
  toast(`Pedido #${order.number} criado — ${fmt.brl(total)}`,'success','✓');
  pushNotif(`Novo pedido #${order.number} via ${channelLabel(channel)}`,'🛍️','info');
  updateSidebar();
}

/* ─── RECEIPT / COMANDA ───────────────────────────────────────── */
function printReceipt(id){
  const o=S.orders.find(x=>x.id===id);
  if(!o) return;
  const biz=S.settings.businessName||'Forge ERP';
  const addr=S.settings.address||'';
  const phone=S.settings.phone||'';
  const sep='─'.repeat(32);
  const rows=o.items.map(it=>{
    const left=`${it.name.slice(0,18)} x${it.qty}`;
    const right=fmt.brl(it.total);
    const pad=32-left.length-right.length;
    return left+' '.repeat(Math.max(1,pad))+right;
  }).join('\n    ');
  const w=window.open('','_blank','width=420,height=680,toolbar=0,menubar=0');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Comanda #${o.number}</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Courier New',Courier,monospace;font-size:13px;padding:24px 20px;max-width:340px;margin:0 auto;color:#111;background:#fff}
    h2{text-align:center;font-size:17px;letter-spacing:.05em;margin-bottom:2px}
    .sub{text-align:center;font-size:11px;color:#555;margin-bottom:2px}
    .sep{border:none;border-top:1px dashed #999;margin:10px 0}
    .row{display:flex;justify-content:space-between;margin:4px 0;font-size:12px}
    .item-line{margin:3px 0;font-size:12px}
    .total-row{display:flex;justify-content:space-between;margin:6px 0;font-size:14px;font-weight:bold}
    .center{text-align:center}
    .thanks{text-align:center;margin-top:14px;font-size:11px;color:#555}
    @media print{body{padding:8px}button{display:none}}
  </style></head><body>
  <h2>${biz}</h2>
  ${addr?`<p class="sub">${addr}</p>`:''}
  ${phone?`<p class="sub">Tel: ${phone}</p>`:''}
  <hr class="sep">
  <div class="row"><span>Pedido</span><b>#${o.number}</b></div>
  <div class="row"><span>Cliente</span><span>${o.customerName}</span></div>
  <div class="row"><span>Canal</span><span>${channelLabel(o.channel)}</span></div>
  <div class="row"><span>Data/Hora</span><span>${fmt.dt(o.createdAt)}</span></div>
  <div class="row"><span>Pagamento</span><span>${o.payment||'—'}</span></div>
  <hr class="sep">
  <div style="margin-bottom:4px;font-size:11px;color:#555;letter-spacing:.08em;text-transform:uppercase">Itens</div>
  ${o.items.map(it=>`<div class="row"><span>${it.name} <b>×${it.qty}</b></span><span>${fmt.brl(it.total)}</span></div>`).join('')}
  <hr class="sep">
  <div class="total-row"><span>TOTAL</span><span>${fmt.brl(o.total)}</span></div>
  <hr class="sep">
  <p class="thanks">Obrigado pela preferência!<br>${new Date().toLocaleString('pt-BR')}</p>
  <div style="margin-top:18px;text-align:center">
    <button onclick="window.print();window.close()" style="font-family:inherit;font-size:13px;padding:8px 24px;cursor:pointer;border:1px solid #333;background:#fff;border-radius:4px">Imprimir</button>
  </div>
  </body></html>`);
  w.document.close();
  setTimeout(()=>w.print(),400);
}

/* ─── EXPORT ──────────────────────────────────────────────────── */
function exportCSV(){
  const rows=[['#Pedido','Cliente','Canal','Total','Status','Data']];
  S.orders.forEach(o=>rows.push([o.number,o.customerName,channelLabel(o.channel),o.total.toFixed(2),o.status,fmt.dt(o.createdAt)]));
  const csv=rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`forge-pedidos-${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}.csv`;
  a.click();URL.revokeObjectURL(url);
  toast('CSV exportado com sucesso','success','📊');
}

/* ─── LIVE CLOCK ──────────────────────────────────────────────── */
function tick(){
  const now=new Date();
  const el=document.getElementById('topbar-clock');
  if(el) el.textContent=now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}

/* ─── KEYBOARD SHORTCUTS ─────────────────────────────────────── */
document.addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();openSearch();}
  if(e.key==='Escape'){
    closeSearch();
    if(document.getElementById('modal-overlay').classList.contains('open')) closeModal();
    if(document.getElementById('notif-dropdown').classList.contains('open'))
      document.getElementById('notif-dropdown').classList.remove('open');
  }
});

document.addEventListener('click',e=>{
  const nb=document.getElementById('notif-btn');
  const nd=document.getElementById('notif-dropdown');
  if(nd?.classList.contains('open')&&!nb?.closest('.notif-btn-wrap')?.contains(e.target)){
    nd.classList.remove('open');
  }
});

document.getElementById('main-nav').addEventListener('click',e=>{
  const item=e.target.closest('.nav-item');
  if(item?.dataset.page) navigate(item.dataset.page);
});

/* ─── BOOT ───────────────────────────────────────────────────── */
store.load();
if(!S.seeded) store.seed();

Chart.defaults.color='#475569';
Chart.defaults.borderColor='#2a2a35';
Chart.defaults.font.family="'DM Mono', monospace";
Chart.defaults.font.size=11;

renderNotifList();
updateSidebar();

tick();
setInterval(tick,1000);

navigate(S.page||'dashboard');
</script>
</body>
</html>
